<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WHAPE — Convierte tu mayor problema en tu mayor oportunidad</title>
<meta name="description" content="Entrena la habilidad de ver oportunidades donde otros solo ven problemas, y conviértelas en un negocio que vende por WhatsApp. Solo 100 cupos." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Convierte tu mayor problema en tu mayor oportunidad" />
<meta property="og:description" content="Una comunidad donde cada problema se ve como una oportunidad de negocio. Solo abriré 100 cupos." />
<meta property="og:image" content="https://whape.club/logo.png" />
<meta property="og:url" content="https://whape.club" />
<link rel="icon" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0F0C1C; --surface:#1A1630; --surface2:#241F3D; --stroke:#332C52;
    --accent:#8E2DE2; --accent2:#4A00E0; --success:#2BD9A6; --gold:#FFD24A;
    --text:#FFFFFF; --muted:#ABA4C7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Sora',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100dvh}
  a{text-decoration:none;color:inherit}
  .grad{background:linear-gradient(100deg,var(--accent) 10%,var(--success) 90%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .app{max-width:560px;margin:0 auto;padding:0 16px 40px;min-height:100dvh;display:flex;flex-direction:column}

  /* top */
  .bar{display:flex;align-items:center;gap:9px;padding:16px 2px 10px}
  .bar img{width:30px;height:30px;border-radius:8px}
  .bar b{font-weight:800;letter-spacing:.12em;font-size:14px}
  .bar .cupos{margin-left:auto;font-size:11px;font-weight:700;color:var(--gold);background:rgba(255,210,74,.12);border:1px solid rgba(255,210,74,.3);padding:5px 10px;border-radius:999px}

  /* progress */
  .prog{height:5px;background:var(--surface2);border-radius:999px;overflow:hidden;margin:4px 2px 14px}
  .prog > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--success));transition:width .5s ease}

  /* intro */
  .intro{text-align:center;padding:30px 6px 10px;animation:fade .5s ease}
  .intro .eyebrow{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);background:rgba(255,210,74,.1);border:1px solid rgba(255,210,74,.3);padding:6px 13px;border-radius:999px;margin-bottom:18px}
  .intro h1{font-size:clamp(27px,7.5vw,38px);line-height:1.12;font-weight:800;letter-spacing:-.02em}
  .intro p{color:var(--muted);font-size:16px;margin:16px auto 26px;max-width:30ch}

  /* chat */
  .chat{flex:1;display:none;padding-top:6px}
  .row{display:flex;margin-bottom:9px;animation:slide .45s ease both}
  .row.me{justify-content:flex-end}
  .bubble{max-width:86%;padding:12px 15px;border-radius:18px;font-size:15.5px;line-height:1.5}
  .row.bot .bubble{background:var(--surface);border:1px solid var(--stroke);border-bottom-left-radius:6px}
  .row.me .bubble{background:linear-gradient(120deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:6px;font-weight:600}
  .av{width:30px;height:30px;border-radius:50%;margin-right:9px;flex:none;background:var(--surface2);border:1px solid var(--stroke);display:flex;align-items:center;justify-content:center;font-size:15px}

  .typing{display:flex;gap:4px;padding:14px 16px;background:var(--surface);border:1px solid var(--stroke);border-radius:18px;border-bottom-left-radius:6px;width:max-content}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}

  .opts{display:flex;flex-direction:column;gap:9px;margin:12px 0 4px;animation:fade .4s ease}
  .opt{text-align:left;background:var(--surface2);border:1px solid var(--stroke);color:var(--text);font-family:inherit;font-size:15px;font-weight:600;padding:14px 16px;border-radius:14px;cursor:pointer;transition:transform .12s,border-color .12s}
  .opt:hover{border-color:var(--accent);transform:translateX(3px)}

  /* fork cards */
  .fork{display:flex;flex-direction:column;gap:14px;margin:14px 0 4px;animation:fade .5s ease}
  .card{background:var(--surface);border:1px solid var(--stroke);border-radius:20px;padding:22px 20px;position:relative}
  .card.hot{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 14px 40px rgba(255,210,74,.12)}
  .card .tag{position:absolute;top:-11px;left:20px;font-size:11px;font-weight:800;padding:4px 11px;border-radius:999px;background:var(--gold);color:#241a00}
  .card h3{font-size:20px;font-weight:800;margin-bottom:6px}
  .card .price{font-size:15px;font-weight:800;color:var(--gold);margin:6px 0}
  .card .price small{color:var(--muted);font-weight:600;font-size:12.5px}
  .card p{color:var(--muted);font-size:14px;margin-bottom:14px}
  .card ul{list-style:none;margin:0 0 16px;display:flex;flex-direction:column;gap:7px}
  .card li{font-size:13.5px;color:#E7E3F4;display:flex;gap:8px}
  .card li b{color:var(--success)}
  .btn{display:block;text-align:center;font-weight:800;font-size:16px;padding:15px;border-radius:14px;border:none;cursor:pointer;width:100%;transition:transform .15s,box-shadow .15s}
  .btn-prem{background:linear-gradient(120deg,var(--gold),#ff9d2e);color:#241a00;box-shadow:0 10px 30px rgba(255,210,74,.3)}
  .btn-prem:hover{transform:translateY(-2px)}
  .btn-free{background:var(--success);color:#06241B}
  .btn-free:hover{transform:translateY(-2px)}
  .card.free{background:var(--surface2)}
  .restart{display:block;margin:22px auto 0;background:none;border:none;color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;text-decoration:underline}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes slide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
</style>
</head>
<body>
<div class="app">
  <div class="bar">
    <img src="logo.png" alt="WHAPE" /><b>WHAPE</b>
    <span class="cupos">🔥 Solo 100 cupos</span>
  </div>
  <div class="prog"><i id="progFill"></i></div>

  <!-- INTRO -->
  <div class="intro" id="intro">
    <span class="eyebrow">Un reto para ti</span>
    <h1>Convierte tu <span class="grad">mayor problema</span> en tu mayor oportunidad.</h1>
    <p>La riqueza no premia a quien trabaja más duro. Premia a quien resuelve los problemas que todos quieren evitar.</p>
    <button class="btn btn-prem" style="max-width:300px;margin:0 auto" onclick="start()">Acepto el reto →</button>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>
</div>

<script>
  var WA = '51983427614';
  var FOCUS = 'free';
  var STEP = 0;

  var STEPS = [
    { bot: ["Tengo un reto para ti. 👋", "Quiero que tomes el problema más grande que tienes hoy… y lo conviertas en la oportunidad que cambie tu vida."],
      opts: [{ t: "Acepto el reto →" }] },

    { bot: ["Sé sincero conmigo. ¿Qué describe mejor tu momento de hoy?"],
      opts: [
        { t: "😮‍💨 Tengo un trabajo que no me llena" },
        { t: "🤔 Quiero emprender pero no sé cómo" },
        { t: "📈 Ya vendo algo y quiero que crezca" },
        { t: "👀 Solo estoy explorando" }
      ] },

    { bot: ["No estás solo. Y justo ahí está lo interesante:", "Cuando miles de personas sienten el mismo problema, no solo hay dolor… hay un mercado entero esperando que alguien construya la solución."],
      opts: [{ t: "Tiene sentido…" }] },

    { bot: ["Una pregunta clave. Cuando ves un problema, ¿qué ves primero?"],
      opts: [
        { t: "Una molestia que quiero evitar" },
        { t: "Tal vez… una oportunidad" }
      ] },

    { bot: ["La mayoría ve problemas. Los creadores ven oportunidades. 🔑", "Cada negocio exitoso nació de una sola pregunta:", "«¿Por qué existe este problema… y cómo lo resolvería mejor?»"],
      opts: [{ t: "Quiero aprender a pensar así" }] },

    { bot: ["El problema real es el entorno.", "Es muy difícil crear algo grande rodeado de gente que convierte cada problema en una excusa. Las ideas se contagian… y la forma de pensar también."],
      opts: [{ t: "Eso me pasa 😣" }, { t: "Quiero cambiar mi entorno" }] },

    { bot: ["Por eso creé esta comunidad. 🌐", "Un lugar donde cada problema se ve como una oportunidad, y entrenamos algo que no enseñan en el colegio: convertir frustraciones en un negocio que vende por WhatsApp + Yape con un sistema completo (landing + bot + CRM + academia)."],
      opts: [{ t: "Eso es exactamente lo que busco" }] },

    { bot: ["Solo voy a abrir el acceso a las primeras 100 personas que quieran desarrollar esta forma de pensar desde cero.", "¿Qué tan en serio te lo tomas?"],
      opts: [
        { t: "🔥 Voy en serio, lo quiero todo", focus: "premium" },
        { t: "🌱 Quiero empezar de a pocos", focus: "free" }
      ] },

    { bot: ["Llegaste hasta aquí, y eso ya dice mucho de ti. 👏", "Elige cómo quieres empezar:"],
      fork: true }
  ];

  function start(){
    document.getElementById('intro').style.display = 'none';
    document.getElementById('chat').style.display = 'block';
    go(0);
  }

  function progress(i){
    document.getElementById('progFill').style.width = Math.round(i / (STEPS.length - 1) * 100) + '%';
  }

  function el(html){ var d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstChild; }
  function chat(){ return document.getElementById('chat'); }
  function scrollDown(){ window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }

  function appendBot(text){
    var r = el('<div class="row bot"><div class="av">🧠</div><div class="bubble"></div></div>');
    r.querySelector('.bubble').textContent = text;
    chat().appendChild(r); scrollDown();
  }
  function appendMe(text){
    var r = el('<div class="row me"><div class="bubble"></div></div>');
    r.querySelector('.bubble').textContent = text;
    chat().appendChild(r); scrollDown();
  }
  function showTyping(){
    var t = el('<div class="row bot" id="typing"><div class="av">🧠</div><div class="typing"><span></span><span></span><span></span></div></div>');
    chat().appendChild(t); scrollDown();
  }
  function hideTyping(){ var t = document.getElementById('typing'); if(t) t.remove(); }

  function go(i){
    STEP = i; progress(i);
    var s = STEPS[i];
    var msgs = s.bot.slice();
    (function next(){
      if(!msgs.length){ s.fork ? renderFork() : renderOpts(s); return; }
      showTyping();
      setTimeout(function(){ hideTyping(); appendBot(msgs.shift()); setTimeout(next, 350); }, 600);
    })();
  }

  function renderOpts(s){
    var box = el('<div class="opts"></div>');
    s.opts.forEach(function(o){
      var b = el('<button class="opt"></button>');
      b.textContent = o.t;
      b.onclick = function(){ choose(o); };
      box.appendChild(b);
    });
    chat().appendChild(box); scrollDown();
  }

  function choose(o){
    var opts = chat().querySelector('.opts'); if(opts) opts.remove();
    appendMe(o.t);
    if(o.focus) FOCUS = o.focus;
    setTimeout(function(){ go(STEP + 1); }, 250);
  }

  function renderFork(){
    progress(STEPS.length - 1);
    var premHot = FOCUS === 'premium';
    var prem = el('<div class="card premium' + (premHot ? ' hot' : '') + '"></div>');
    prem.innerHTML =
      (premHot ? '<span class="tag">⭐ Recomendado para ti</span>' : '') +
      '<h3>🚀 Acceso Premium</h3>' +
      '<div class="price">Pago único S/99 <small>· de por vida, sin mensualidad</small></div>' +
      '<p>Para quien va en serio. Solo 100 cupos.</p>' +
      '<ul>' +
        '<li><b>✓</b> Academia Premium completa (paso a paso)</li>' +
        '<li><b>✓</b> El sistema de ventas: landing + bot + CRM + academia</li>' +
        '<li><b>✓</b> Plantillas y recursos listos para usar</li>' +
        '<li><b>✓</b> Acompañamiento en la comunidad</li>' +
      '</ul>' +
      '<a class="btn btn-prem" data-ev="premium_click" href="https://wa.me/' + WA + '?text=' + encodeURIComponent('Hola, quiero el ACCESO PREMIUM de WHAPE (S/99) (premium)') + '" target="_blank" rel="noopener">Quiero mi acceso Premium →</a>';

    var free = el('<div class="card free"></div>');
    free.innerHTML =
      '<h3>🌱 Empezar gratis</h3>' +
      '<p>Da tu primer paso hoy, sin pagar nada. Únete a la comunidad + academia y empieza a entrenar esta forma de pensar.</p>' +
      '<a class="btn btn-free" data-ev="gratis_click" href="https://wa.me/' + WA + '?text=' + encodeURIComponent('Hola, quiero entrar GRATIS a la comunidad WHAPE (gratis)') + '" target="_blank" rel="noopener">Entrar gratis</a>';

    var box = el('<div class="fork"></div>');
    if(premHot){ box.appendChild(prem); box.appendChild(free); }
    else { box.appendChild(free); box.appendChild(prem); }
    var restart = el('<button class="restart">↻ Empezar de nuevo</button>');
    restart.onclick = function(){ location.reload(); };
    box.appendChild(restart);
    chat().appendChild(box); scrollDown();
  }
</script>
<script defer src="/_vercel/insights/script.js"></script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<script src="/track.js"></script>
</body>
</html>
