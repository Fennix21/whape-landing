<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Comunidad WHAPE</title>
<meta name="description" content="Comunidad WHAPE: clases y contenido de valor para vender más y cobrar seguro." />
<link rel="icon" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#0F0C1C;--surface:#1A1630;--surface2:#241F3D;--stroke:#332C52;--accent:#8E2DE2;--accent2:#4A00E0;--success:#2BD9A6;--gold:#FFD24A;--text:#FFFFFF;--muted:#ABA4C7}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Sora',system-ui,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  a{color:var(--gold)}
  .wrap{max-width:880px;margin:0 auto;padding:18px 16px 70px}

  /* --- Login / registro --- */
  #auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--stroke);border-radius:18px;padding:26px 22px}
  .logo{width:64px;height:64px;border-radius:16px;display:block;margin:0 auto 12px}
  .card h1{font-size:21px;text-align:center;margin:0 0 4px}
  .card .sub{text-align:center;color:var(--muted);font-size:13.5px;margin:0 0 18px}
  .tabs{display:flex;gap:6px;background:var(--bg);border:1px solid var(--stroke);border-radius:12px;padding:4px;margin-bottom:16px}
  .tabs button{flex:1;background:transparent;border:0;color:var(--muted);font-family:inherit;font-size:14px;font-weight:700;padding:9px;border-radius:9px;cursor:pointer}
  .tabs button.on{background:var(--accent);color:#fff}
  label{display:block;font-size:12.5px;color:var(--muted);margin:10px 0 5px}
  input{width:100%;padding:12px 14px;font-size:15px;border-radius:11px;border:1px solid var(--stroke);background:var(--bg);color:#fff;font-family:inherit}
  input:focus{outline:none;border-color:var(--accent)}
  .btn{width:100%;margin-top:16px;padding:13px;font-size:15px;font-weight:800;border:0;border-radius:12px;cursor:pointer;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;font-family:inherit}
  .btn:active{transform:translateY(1px)}
  .err{color:#ff8aa0;font-size:13px;margin-top:12px;text-align:center;min-height:18px}
  .hint{color:var(--muted);font-size:11.5px;margin-top:14px;text-align:center;line-height:1.5}

  /* --- App --- */
  #app{display:none}
  .top{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--stroke);background:var(--surface);position:sticky;top:0;z-index:5}
  .top img{width:34px;height:34px;border-radius:9px}
  .top .ti{font-weight:800;font-size:15px}
  .top .me{margin-left:auto;color:var(--muted);font-size:12.5px}
  .top .out{background:var(--surface2);border:1px solid var(--stroke);color:var(--muted);font-family:inherit;font-size:12.5px;font-weight:700;padding:7px 12px;border-radius:9px;cursor:pointer}
  .hello{font-size:16px;color:var(--muted);margin:18px 2px 10px}
  .hello b{color:var(--text)}

  /* progreso general */
  .ovbar{height:9px;background:var(--surface);border:1px solid var(--stroke);border-radius:999px;overflow:hidden;margin:4px 2px 6px}
  .ovbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));transition:width .3s}
  .ovtext{color:var(--muted);font-size:12.5px;margin:0 2px 16px}
  .resume{width:100%;padding:13px;border:0;border-radius:12px;font-family:inherit;font-weight:800;font-size:14.5px;color:#fff;background:linear-gradient(90deg,var(--accent),var(--accent2));cursor:pointer;margin-bottom:20px}

  /* módulos */
  .modcard{display:flex;gap:14px;background:var(--surface);border:1px solid var(--stroke);border-radius:16px;padding:14px;margin-bottom:12px;cursor:pointer;align-items:center;transition:border-color .15s}
  .modcard:hover{border-color:var(--accent)}
  .mod-cover{width:84px;height:84px;border-radius:12px;flex:none;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:30px}
  .mod-info{flex:1;min-width:0}
  .mod-t{font-weight:800;font-size:15.5px}
  .mod-d{color:var(--muted);font-size:12.5px;margin:3px 0 8px;line-height:1.4}
  .mod-bar{height:7px;background:var(--bg);border-radius:999px;overflow:hidden;margin-bottom:5px}
  .mod-bar-fill{height:100%;background:var(--success);transition:width .3s}
  .mod-meta{color:var(--muted);font-size:11.5px}

  /* módulo → clases */
  .back2{background:var(--surface);border:1px solid var(--stroke);color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;padding:8px 14px;border-radius:10px;cursor:pointer;margin:4px 0 16px}
  #viewModule h2,#viewLesson h2{font-size:21px;margin:0 0 6px;line-height:1.3}
  .moddesc{color:var(--muted);font-size:14px;margin:0 0 18px;line-height:1.5}
  .lrow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--stroke);border-radius:12px;padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:border-color .15s}
  .lrow:hover{border-color:var(--accent)}
  .lrow .ck{width:24px;height:24px;border-radius:50%;border:2px solid var(--stroke);flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#06241B}
  .lrow .ck.on{background:var(--success);border-color:var(--success)}
  .lrow .lt{flex:1;min-width:0;font-weight:600;font-size:14px}
  .lrow .ar{color:var(--muted);font-size:14px}

  /* clase (reproductor) */
  .lesson-grid{display:grid;grid-template-columns:1fr;gap:20px}
  @media(min-width:840px){.lesson-grid{grid-template-columns:1fr 290px}}
  .vwrap{position:relative;width:100%;padding-bottom:56.25%;border-radius:12px;overflow:hidden;background:#000}
  .vwrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .cover-img{width:100%;border-radius:12px;display:block}
  .lesson-head{display:flex;align-items:flex-start;gap:12px;margin-top:16px}
  .lesson-head h2{flex:1}
  .done-btn{flex:none;border:1px solid var(--success);background:transparent;color:var(--success);font-family:inherit;font-weight:800;font-size:13px;padding:9px 13px;border-radius:10px;cursor:pointer;white-space:nowrap}
  .done-btn.on{background:var(--success);color:#06241B}
  .lesson-body{color:#E7E3F4;font-size:14.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word;margin-top:14px}
  .lesson-body a{word-break:break-all}
  .lesson-nav{display:flex;gap:10px;margin-top:22px}
  .lesson-nav button{flex:1;background:var(--surface);border:1px solid var(--stroke);color:var(--text);font-family:inherit;font-weight:700;font-size:13.5px;padding:11px;border-radius:11px;cursor:pointer}
  .lesson-nav button:disabled{opacity:.4;cursor:default}
  .lesson-side{align-self:start}
  .side-title{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:9px;text-transform:uppercase;letter-spacing:.05em}
  .pl-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--stroke);border-radius:10px;margin-bottom:7px;cursor:pointer;font-size:13px}
  .pl-item:hover{border-color:var(--accent)}
  .pl-item.cur{border-color:var(--accent);background:var(--surface)}
  .pl-item .pck{width:18px;height:18px;border-radius:50%;border:2px solid var(--stroke);flex:none;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#06241B}
  .pl-item .pck.on{background:var(--success);border-color:var(--success)}
  .pl-item .pt{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty2{text-align:center;color:var(--muted);padding:50px 20px;font-size:14.5px;line-height:1.6}
</style>
</head>
<body>

<!-- ===== LOGIN / REGISTRO ===== -->
<div id="auth">
  <div class="card">
    <img src="logo.png" class="logo" alt="WHAPE" />
    <h1>Comunidad WHAPE</h1>
    <p class="sub">Clases y contenido de valor para vender más y cobrar seguro. 🔊</p>
    <div class="tabs">
      <button id="tabSignup" class="on" onclick="setTab('signup')">Registrarme</button>
      <button id="tabLogin" onclick="setTab('login')">Entrar</button>
    </div>
    <div id="formSignup">
      <label>Tu nombre</label>
      <input id="suName" placeholder="Ej. Juan Pérez" autocomplete="name" />
      <label>Tu WhatsApp</label>
      <input id="suPhone" placeholder="Ej. 983427614" inputmode="numeric" autocomplete="tel" />
      <label>Crea una contraseña</label>
      <input id="suPass" type="password" placeholder="Mínimo 4 caracteres" autocomplete="new-password" />
      <button class="btn" onclick="signup()">Crear mi cuenta gratis 🚀</button>
      <div class="err" id="suErr"></div>
      <p class="hint">Es gratis. Usamos tu WhatsApp solo para avisarte de novedades. Al registrarte aceptas recibir contenido de la comunidad.</p>
    </div>
    <div id="formLogin" style="display:none">
      <label>Tu WhatsApp</label>
      <input id="liPhone" placeholder="Ej. 983427614" inputmode="numeric" autocomplete="tel" />
      <label>Tu contraseña</label>
      <input id="liPass" type="password" placeholder="Tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()" />
      <button class="btn" onclick="login()">Entrar</button>
      <div class="err" id="liErr"></div>
    </div>
  </div>
</div>

<!-- ===== APP (LMS) ===== -->
<div id="app">
  <div class="top">
    <img src="logo.png" alt="WHAPE" />
    <span class="ti">Comunidad WHAPE</span>
    <span class="me" id="meName"></span>
    <button class="out" onclick="logout()">Salir</button>
  </div>
  <div class="wrap">
    <!-- INICIO -->
    <div id="viewHome">
      <div class="hello" id="hello"></div>
      <div class="ovbar"><div class="ovbar-fill" id="ovFill" style="width:0%"></div></div>
      <div class="ovtext" id="ovText"></div>
      <button class="resume" id="resumeBtn" style="display:none" onclick="resumeLast()">▶ Continuar desde donde lo dejé</button>
      <div id="modules"></div>
    </div>
    <!-- MÓDULO -->
    <div id="viewModule" style="display:none">
      <button class="back2" onclick="goHome()">← Volver al inicio</button>
      <h2 id="modTitle"></h2>
      <p class="moddesc" id="modDesc"></p>
      <div id="modLessons"></div>
    </div>
    <!-- CLASE -->
    <div id="viewLesson" style="display:none">
      <button class="back2" onclick="backToModule()">← <span id="lsBackName"></span></button>
      <div class="lesson-grid">
        <div class="lesson-main">
          <div id="lsMedia"></div>
          <div class="lesson-head">
            <h2 id="lsTitle"></h2>
            <button class="done-btn" id="doneBtn" onclick="toggleComplete()"></button>
          </div>
          <div class="lesson-body" id="lsBody"></div>
          <div class="lesson-nav">
            <button id="prevBtn" onclick="prevLesson()">← Anterior</button>
            <button id="nextBtn" onclick="nextLesson()">Siguiente →</button>
          </div>
        </div>
        <div class="lesson-side">
          <div class="side-title">Clases de este módulo</div>
          <div id="lsPlaylist"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  var TOKEN = localStorage.getItem('whape_club') || '';
  var NAME = localStorage.getItem('whape_club_name') || '';
  var ACADEMY = { modules:[], progress:{done:{},last:''}, name:'' };
  var curMod = null, curLesson = null;

  function setTab(t){
    document.getElementById('tabSignup').classList.toggle('on', t==='signup');
    document.getElementById('tabLogin').classList.toggle('on', t==='login');
    document.getElementById('formSignup').style.display = t==='signup' ? 'block':'none';
    document.getElementById('formLogin').style.display = t==='login' ? 'block':'none';
  }
  function esc(t){ var e=document.createElement('div'); e.textContent=t==null?'':t; return e.innerHTML; }
  function ytId(u){ if(!u) return ''; var m=u.match(/(?:youtu\.be\/|v=|embed\/|shorts\/)([\w-]{11})/); if(m) return m[1]; if(/^[\w-]{11}$/.test(u.trim())) return u.trim(); return ''; }
  function linkify(t){ return esc(t).replace(/(https?:\/\/[^\s]+)/g, function(u){ return '<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>'; }); }

  async function api(action, data){
    try{
      var r = await fetch('/api/community', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify(Object.assign({action:action}, data||{})) });
      var d = await r.json();
      return { ok:r.ok, d:d };
    }catch(e){ return { ok:false, d:{error:'Sin conexión. Revisa tu internet.'} }; }
  }

  async function signup(){
    var err=document.getElementById('suErr'); err.textContent='';
    var res = await api('signup', { name:document.getElementById('suName').value.trim(), phone:document.getElementById('suPhone').value.trim(), password:document.getElementById('suPass').value });
    if(!res.ok){ err.textContent = res.d.error || 'No se pudo registrar.'; return; }
    enter(res.d.token, res.d.name);
  }
  async function login(){
    var err=document.getElementById('liErr'); err.textContent='';
    var res = await api('login', { phone:document.getElementById('liPhone').value.trim(), password:document.getElementById('liPass').value });
    if(!res.ok){ err.textContent = res.d.error || 'No se pudo entrar.'; return; }
    enter(res.d.token, res.d.name);
  }
  function enter(token, name){
    TOKEN=token; NAME=name||'';
    localStorage.setItem('whape_club', token);
    localStorage.setItem('whape_club_name', NAME);
    showApp();
  }
  function logout(){
    TOKEN=''; localStorage.removeItem('whape_club'); localStorage.removeItem('whape_club_name');
    document.getElementById('app').style.display='none';
    document.getElementById('auth').style.display='flex';
  }

  // ---- helpers de academia ----
  function flat(){ var a=[]; (ACADEMY.modules||[]).forEach(function(m){ (m.lessons||[]).forEach(function(l){ a.push({mod:m, lesson:l}); }); }); return a; }
  function isDone(id){ return !!(ACADEMY.progress && ACADEMY.progress.done && ACADEMY.progress.done[id]); }
  function stats(){ var f=flat(); var done=f.filter(function(x){return isDone(x.lesson.id);}).length; return { total:f.length, done:done, pct: f.length? Math.round(done/f.length*100):0 }; }
  function findFlatIndex(id){ var f=flat(); for(var i=0;i<f.length;i++){ if(f[i].lesson.id===id) return i; } return -1; }

  function show(view){ ['viewHome','viewModule','viewLesson'].forEach(function(v){ document.getElementById(v).style.display = (v===view?'block':'none'); }); window.scrollTo(0,0); }

  async function showApp(){
    document.getElementById('auth').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('meName').textContent = NAME ? ('👋 '+NAME) : '';
    await loadAcademy();
  }
  async function loadAcademy(){
    var res = await api('academy', { token:TOKEN });
    if(!res.ok){ if(res.d && /sesión/i.test(res.d.error||'')){ logout(); return; } ACADEMY={modules:[],progress:{done:{},last:''}}; goHome(); return; }
    ACADEMY = res.d; if(!ACADEMY.progress) ACADEMY.progress={done:{},last:''};
    if(res.d.name){ NAME=res.d.name; document.getElementById('meName').textContent='👋 '+NAME; }
    goHome();
  }

  function goHome(){ renderHome(); show('viewHome'); }
  function renderHome(){
    document.getElementById('hello').innerHTML = NAME ? ('Hola <b>'+esc(NAME)+'</b>, esta es tu academia 🎓') : 'Bienvenido a tu academia 🎓';
    var s=stats();
    document.getElementById('ovFill').style.width=s.pct+'%';
    document.getElementById('ovText').textContent = s.total ? (s.done+' de '+s.total+' clases · '+s.pct+'% completado') : 'Aún no hay clases publicadas.';
    var rb=document.getElementById('resumeBtn');
    rb.style.display = (ACADEMY.progress.last && findFlatIndex(ACADEMY.progress.last)>=0) ? 'block':'none';
    var mc=document.getElementById('modules');
    if(!ACADEMY.modules || !ACADEMY.modules.length){ mc.innerHTML='<div class="empty2">📚 Pronto subiremos las clases. ¡Quédate atento!</div>'; return; }
    mc.innerHTML = ACADEMY.modules.map(function(m){
      var ls=m.lessons||[]; var d=ls.filter(function(l){return isDone(l.id);}).length;
      var pct = ls.length? Math.round(d/ls.length*100):0;
      var cover = m.image ? '<img class="mod-cover" src="'+esc(m.image)+'" alt="" />' : '<div class="mod-cover">📚</div>';
      return '<div class="modcard" onclick="openModule(\''+m.id+'\')">'+cover+
        '<div class="mod-info"><div class="mod-t">'+esc(m.title||'Módulo')+'</div>'+
        (m.desc?'<div class="mod-d">'+esc(m.desc)+'</div>':'')+
        '<div class="mod-bar"><div class="mod-bar-fill" style="width:'+pct+'%"></div></div>'+
        '<div class="mod-meta">'+d+'/'+ls.length+' clases · '+pct+'%</div></div></div>';
    }).join('');
  }

  function openModule(id){ curMod = (ACADEMY.modules||[]).find(function(m){return m.id===id;}); if(!curMod) return; renderModule(); show('viewModule'); }
  function renderModule(){
    var m=curMod;
    document.getElementById('modTitle').textContent=m.title||'';
    var dd=document.getElementById('modDesc'); dd.textContent=m.desc||''; dd.style.display=m.desc?'block':'none';
    var ml=document.getElementById('modLessons'); var ls=m.lessons||[];
    if(!ls.length){ ml.innerHTML='<div class="empty2">Este módulo aún no tiene clases.</div>'; return; }
    ml.innerHTML=ls.map(function(l){
      var d=isDone(l.id);
      return '<div class="lrow" onclick="openLesson(\''+m.id+'\',\''+l.id+'\')"><span class="ck'+(d?' on':'')+'">'+(d?'✓':'')+'</span><span class="lt">'+esc(l.title||'(sin título)')+'</span><span class="ar">▶</span></div>';
    }).join('');
  }
  function backToModule(){ if(curMod){ renderModule(); show('viewModule'); } else { goHome(); } }

  function openLesson(modId, lessonId){
    var m=(ACADEMY.modules||[]).find(function(x){return x.id===modId;}); if(!m) return;
    var l=(m.lessons||[]).find(function(x){return x.id===lessonId;}); if(!l) return;
    curMod=m; curLesson=l;
    ACADEMY.progress.last=lessonId;
    api('seen', { token:TOKEN, lessonId:lessonId });
    renderLesson(); show('viewLesson');
  }
  function renderLesson(){
    var l=curLesson, m=curMod;
    document.getElementById('lsBackName').textContent = m.title||'Volver';
    var vid=ytId(l.video);
    var media = vid ? '<div class="vwrap"><iframe src="https://www.youtube.com/embed/'+vid+'" allowfullscreen></iframe></div>'
      : (l.image ? '<img class="cover-img" src="'+esc(l.image)+'" alt="" />' : '');
    document.getElementById('lsMedia').innerHTML=media;
    document.getElementById('lsTitle').textContent=l.title||'';
    document.getElementById('lsBody').innerHTML = l.body ? linkify(l.body) : '';
    var done=isDone(l.id);
    var db=document.getElementById('doneBtn');
    db.className='done-btn'+(done?' on':''); db.textContent = done ? '✓ Completada' : 'Marcar completada';
    var f=flat(), i=findFlatIndex(l.id);
    document.getElementById('prevBtn').disabled = i<=0;
    document.getElementById('nextBtn').disabled = i>=f.length-1;
    document.getElementById('lsPlaylist').innerHTML=(m.lessons||[]).map(function(x){
      var d=isDone(x.id);
      return '<div class="pl-item'+(x.id===l.id?' cur':'')+'" onclick="openLesson(\''+m.id+'\',\''+x.id+'\')"><span class="pck'+(d?' on':'')+'">'+(d?'✓':'')+'</span><span class="pt">'+esc(x.title||'(sin título)')+'</span></div>';
    }).join('');
  }
  function toggleComplete(){
    var l=curLesson; var nd=!isDone(l.id);
    if(!ACADEMY.progress.done) ACADEMY.progress.done={};
    if(nd) ACADEMY.progress.done[l.id]=true; else delete ACADEMY.progress.done[l.id];
    renderLesson();
    api('complete', { token:TOKEN, lessonId:l.id, done:nd });
  }
  function nextLesson(){ var f=flat(), i=findFlatIndex(curLesson.id); if(i>=0 && i<f.length-1){ openLesson(f[i+1].mod.id, f[i+1].lesson.id); } }
  function prevLesson(){ var f=flat(), i=findFlatIndex(curLesson.id); if(i>0){ openLesson(f[i-1].mod.id, f[i-1].lesson.id); } }
  function resumeLast(){ var f=flat(); var x=f.find(function(y){return y.lesson.id===ACADEMY.progress.last;}) || f[0]; if(x) openLesson(x.mod.id, x.lesson.id); }

  if(TOKEN){ showApp(); } else { setTab('signup'); }
</script>
</body>
</html>
